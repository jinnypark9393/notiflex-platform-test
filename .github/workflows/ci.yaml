# Notiflex API CI — app/ 변경 시 이미지 빌드 후 Artifact Registry에 푸시한다.
# 인증: Workload Identity Federation (GitHub OIDC, keyless) — SA 키를 저장하지 않는다.
# WIF 리소스는 terraform/gcp/apps/21-workload-identity.tf에서 관리한다.
name: ci

on:
  push:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # GitHub OIDC 토큰 발급에 필요 (WIF)

env:
  REGISTRY_HOST: asia-northeast3-docker.pkg.dev
  IMAGE_REPO: asia-northeast3-docker.pkg.dev/project-fea698e1-5762-48a2-918/notiflex/api

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/454892209447/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: notiflex-ci@project-fea698e1-5762-48a2-918.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "$REGISTRY_HOST" --quiet

      - name: Build and push image (SHA tag)
        run: |
          IMAGE="${IMAGE_REPO}:sha-${GITHUB_SHA::7}"
          docker build -t "$IMAGE" app/
          docker push "$IMAGE"
          echo "pushed: $IMAGE" >> "$GITHUB_STEP_SUMMARY"
