# Notiflex API CI — app/ 변경 시 이미지 빌드·AR 푸시 후 매니페스트 태그를 갱신한다.
# 매니페스트 커밋을 ArgoCD가 감지하여 자동 배포한다 (책 3.5).
# 인증: Workload Identity Federation (GitHub OIDC, keyless) — SA 키를 저장하지 않는다.
# WIF 리소스는 terraform/gcp/apps/21-workload-identity.tf에서 관리한다.
name: ci

on:
  push:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch:

permissions:
  contents: write # 매니페스트 태그 갱신 커밋 push (repo 기본값 read를 워크플로우 레벨에서 상향)
  id-token: write # GitHub OIDC 토큰 발급에 필요 (WIF)

env:
  REGISTRY_HOST: asia-northeast3-docker.pkg.dev
  IMAGE_REPO: asia-northeast3-docker.pkg.dev/project-fea698e1-5762-48a2-918/notiflex/api

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/454892209447/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: notiflex-ci@project-fea698e1-5762-48a2-918.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "$REGISTRY_HOST" --quiet

      - name: Build and push image (SHA tag)
        run: |
          IMAGE="${IMAGE_REPO}:sha-${GITHUB_SHA::7}"
          docker build -t "$IMAGE" app/
          docker push "$IMAGE"
          echo "IMAGE_URI=$IMAGE" >> "$GITHUB_ENV"
          echo "pushed: $IMAGE" >> "$GITHUB_STEP_SUMMARY"

      - name: Update manifest image tag
        run: |
          # 빈 값이면 sed가 이미지 라인을 망가뜨리므로 반드시 먼저 검증한다.
          echo "IMAGE_URI=$IMAGE_URI"
          test -n "$IMAGE_URI"
          sed -i "s|image: ${IMAGE_REPO}:.*|image: ${IMAGE_URI}|" k8s/smb/deployment.yaml
          grep "image:" k8s/smb/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet k8s/smb/deployment.yaml; then
            echo "manifest unchanged, skip commit"
            exit 0
          fi
          git add k8s/smb/deployment.yaml
          git commit -m "ci: deploy image sha-${GITHUB_SHA::7} [skip ci]"
          git push origin main
          echo "manifest updated: sha-${GITHUB_SHA::7}" >> "$GITHUB_STEP_SUMMARY"
