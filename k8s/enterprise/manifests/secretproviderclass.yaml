# enterprise 네임스페이스용 GSM CSI (SecretProviderClass는 네임스페이스 스코프라 테넌트별로 필요).
# smb와 동일하게 GSM valkey-password를 파일로 마운트한다 — 하드코딩 valkey-secret 대신
# 단일 원천(GSM)을 그대로 사용해 WRONGPASS 위험을 없앤다.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: enterprise-secrets
  namespace: enterprise
  labels:
    app: notiflex-api
    tenant: enterprise
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/project-fea698e1-5762-48a2-918/secrets/valkey-password/versions/latest"
        path: "valkey-password"
