# enterprise 테넌트 Notiflex Rollout. smb와 동일 이미지·전략을 쓰되 네임스페이스만 분리한다.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notiflex-api
  namespace: enterprise
  labels:
    app: notiflex-api
    tenant: enterprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notiflex-api
  strategy:
    canary:
      canaryService: notiflex-api-preview
      stableService: notiflex-api
      steps:
        - setWeight: 50
        - pause: { duration: 30s }
  template:
    metadata:
      labels:
        app: notiflex-api
        tenant: enterprise
    spec:
      # smb rollout과 동일한 GKE 자동 라벨 키를 사용해 api-pool에 배치.
      nodeSelector:
        cloud.google.com/gke-nodepool: api-pool
      # GSM 접근용 전용 KSA. WI principal(ns/enterprise/sa/enterprise-api)에 secretAccessor 부여.
      serviceAccountName: enterprise-api
      containers:
        - name: notiflex-api
          image: asia-northeast3-docker.pkg.dev/project-fea698e1-5762-48a2-918/notiflex/api:sha-dbc2ea9
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # cross-namespace: Valkey는 notiflex 네임스페이스에 있으므로 FQDN으로 접속한다.
            # localhost로 접속하면 연결 실패 후 CrashLoopBackOff에 빠진다.
            - name: VALKEY_ADDR
              value: valkey-primary.notiflex.svc.cluster.local:6379
            - name: VALKEY_PASSWORD_FILE
              value: /mnt/secrets/valkey-password
          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: enterprise-secrets
