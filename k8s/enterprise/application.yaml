# enterprise 테넌트 앱 — 순수 매니페스트(k8s/enterprise/manifests) 소스 (7.4).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notiflex-enterprise
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # 앱(enterprise 테넌트)
spec:
  project: default
  source:
    repoURL: https://github.com/jinnypark9393/notiflex-platform-test.git
    targetRevision: main
    path: k8s/enterprise/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
