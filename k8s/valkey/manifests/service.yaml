# valkey-primary: 앱(smb)이 VALKEY_ADDR로 바라보는 이름. 기존 bitnami Service명을 유지해
# 앱 매니페스트 변경 없이 그대로 연결된다.
apiVersion: v1
kind: Service
metadata:
  name: valkey-primary
  namespace: notiflex
  labels:
    app.kubernetes.io/name: valkey
    tenant: smb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
---
# StatefulSet 안정 네트워크 ID용 headless Service.
apiVersion: v1
kind: Service
metadata:
  name: valkey-headless
  namespace: notiflex
  labels:
    app.kubernetes.io/name: valkey
    tenant: smb
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
---
# valkey 파드가 GSM에 접근할 때 쓰는 KSA. WI principal에 secretAccessor를 바인딩한다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: valkey
  namespace: notiflex
  labels:
    app.kubernetes.io/name: valkey
    tenant: smb
