# Valkey 비밀번호의 단일 진실 원천은 Google Secret Manager (ch6.3).
# secretObjects(K8s Secret 합성)를 쓰지 않고 파일로만 마운트한다 — valkey 서버와 앱(smb)이
# 같은 GSM 파일을 직접 읽으므로 비번 불일치 원천이 없고, existingSecret 볼륨 순환도 없다.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: valkey-secrets
  namespace: notiflex
  labels:
    app.kubernetes.io/name: valkey
    tenant: smb
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/project-fea698e1-5762-48a2-918/secrets/valkey-password/versions/latest"
        path: "valkey-password"
