# ch6.3 재발방지: Valkey 비밀번호의 단일 진실 원천을 Google Secret Manager로 통일한다.
# helm이 랜덤 Secret을 만들지 않도록 valkey는 auth.existingSecret=valkey-auth를 참조하고,
# 그 valkey-auth Secret은 이 SecretProviderClass가 GSM에서 읽어 secretObjects로 합성한다.
# (앱(smb)도 같은 GSM 값을 CSI 파일로 읽으므로 앱↔서버 비번 불일치 원천이 사라진다.)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: valkey-secrets
  namespace: notiflex
  labels:
    app.kubernetes.io/name: valkey
    tenant: smb
spec:
  provider: gke
  # CSI 볼륨이 마운트되는 시점에 GSM 값을 읽어 K8s Secret 'valkey-auth'를 합성한다.
  secretObjects:
    - secretName: valkey-auth
      type: Opaque
      data:
        - objectName: valkey-password
          key: valkey-password
  parameters:
    secrets: |
      - resourceName: "projects/project-fea698e1-5762-48a2-918/secrets/valkey-password/versions/latest"
        path: "valkey-password"
