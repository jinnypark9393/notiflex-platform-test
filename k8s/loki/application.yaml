# Loki 로그 저장소 — grafana Helm 차트 소스 + 로컬 values.yaml (4.3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notiflex-loki
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/jinnypark9393/notiflex-platform-test.git
      targetRevision: main
      ref: values
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 7.0.0
      helm:
        valueFiles:
          - $values/k8s/loki/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
