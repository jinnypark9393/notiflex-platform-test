# Notiflex 전용 Grafana 대시보드 (책 4.2 단계 3)
# grafana 사이드카(grafana-sc-dashboard)가 grafana_dashboard 라벨이 붙은
# ConfigMap을 자동으로 읽어 대시보드로 등록한다.
# 참고: monitoring 네임스페이스는 Helm으로 관리 중 (ArgoCD 관리 대상 아님).
apiVersion: v1
kind: ConfigMap
metadata:
  name: notiflex-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  notiflex-dashboard.json: |
    {
      "title": "Notiflex Overview",
      "uid": "notiflex-overview",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Pod CPU 사용량",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"notiflex\", container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 2,
          "title": "Pod Memory 사용량",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"notiflex\", container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 3,
          "title": "네트워크 수신 (HTTP 트래픽 추이)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"notiflex\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 4,
          "title": "Pod 재시작 횟수",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"notiflex\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        }
      ],
      "schemaVersion": 39
    }
