# Tempo 데이터소스 등록 (8.2). Grafana 사이드카가 grafana_datasource 라벨 ConfigMap을
# 자동으로 읽어 등록한다. isDefault: false — Prometheus가 이미 default (가드레일 주의).
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        isDefault: false
