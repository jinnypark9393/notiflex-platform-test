# Kafka 클러스터 (Strimzi 1.1.0, KRaft 모드 단일 브로커) — 8.1.
# KRaft라 ZooKeeper 없음. replicas/storage/resources는 KafkaNodePool에서 관리한다(v1 API).
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: notiflex-kafka
  namespace: kafka
  annotations:
    strimzi.io/kraft: "enabled"
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: "4.3.0"
    metadataVersion: "14.0"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # 단일 브로커라 복제 인수는 모두 1.
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    # topicOperator만 활성화. userOperator는 KafkaUser를 안 쓰므로 제거(CrashLoop 방지).
    # resources는 topicOperator 하위에 직접 둔다(template.topicOperatorContainer엔 resources 필드 없음).
    topicOperator:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
    userOperator: null
---
# 단일 노드가 broker+controller 이중 역할을 겸한다. worker-pool에 배치.
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: single
  namespace: kafka
  labels:
    strimzi.io/cluster: notiflex-kafka
spec:
  replicas: 1
  roles:
    - broker
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        deleteClaim: true
  template:
    pod:
      # worker-pool(e2-standard-2)에 배치 — default-pool은 여유 없음.
      # Strimzi 1.1.0의 template.pod는 nodeSelector를 지원하지 않으므로 nodeAffinity를 쓴다.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cloud.google.com/gke-nodepool
                    operator: In
                    values:
                      - worker-pool
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
