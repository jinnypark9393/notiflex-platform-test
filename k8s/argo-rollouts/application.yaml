# Argo Rollouts 컨트롤러 — argo Helm 차트 소스 + 로컬 values.yaml (5.3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notiflex-argo-rollouts
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/jinnypark9393/notiflex-platform-test.git
      targetRevision: main
      ref: values
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-rollouts
      targetRevision: 2.41.1
      helm:
        valueFiles:
          - $values/k8s/argo-rollouts/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Rollouts CRD는 크기가 커서 kubectl 어노테이션 한계를 넘는다 → ServerSideApply 필수.
      - ServerSideApply=true
