apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notiflex-api
  namespace: notiflex
  labels:
    app: notiflex-api
    tenant: smb
spec:
  # ch6 리소스 예산: B/G 전환 시 active+preview 동시 기동 + Valkey 추가를 감안해 1로 축소.
  # ch7.2 노드풀 확장 후 2로 복원한다.
  replicas: 1
  selector:
    matchLabels:
      app: notiflex-api
  strategy:
    blueGreen:
      activeService: notiflex-api
      previewService: notiflex-api-preview
      autoPromotionEnabled: true
      autoPromotionSeconds: 30
  template:
    metadata:
      labels:
        app: notiflex-api
        tenant: smb
    spec:
      containers:
        - name: notiflex-api
          image: asia-northeast3-docker.pkg.dev/project-fea698e1-5762-48a2-918/notiflex/api:sha-c3912e8
          ports:
            - name: http
              containerPort: 8080
          env:
            # 앱이 /id 응답의 generated_by에 넣을 Pod 이름을 Downward API로 주입한다.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VALKEY_ADDR
              value: valkey-primary.notiflex.svc.cluster.local:6379
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: valkey-password
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
