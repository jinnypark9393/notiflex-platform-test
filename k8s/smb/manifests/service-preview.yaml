# Blue/Green preview 서비스 — 새 버전(green) Pod을 승격 전에 검증하는 진입점.
# selector의 rollouts-pod-template-hash는 Argo Rollouts 컨트롤러가 자동 주입한다.
apiVersion: v1
kind: Service
metadata:
  name: notiflex-api-preview
  namespace: notiflex
  labels:
    app: notiflex-api
    tenant: smb
spec:
  type: ClusterIP
  selector:
    app: notiflex-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
