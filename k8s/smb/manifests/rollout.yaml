apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notiflex-api
  namespace: notiflex
  labels:
    app: notiflex-api
    tenant: smb
spec:
  # ch6 리소스 예산: B/G 전환 시 active+preview 동시 기동 + Valkey 추가를 감안해 1로 축소.
  # ch7.2 노드풀 확장 후 2로 복원한다.
  replicas: 1
  selector:
    matchLabels:
      app: notiflex-api
  strategy:
    # ch6.3: Blue/Green → Canary. 새 버전으로 트래픽을 20→50→80→100%로 점진 이동한다.
    # canaryService는 5.3에서 만든 preview Service를 재사용(삭제 금지 — 없으면 InvalidSpec).
    canary:
      canaryService: notiflex-api-preview
      stableService: notiflex-api
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 80
        - pause: { duration: 30s }
  template:
    metadata:
      labels:
        app: notiflex-api
        tenant: smb
    spec:
      # 7.2: API 워크로드는 api-pool에 배치. 키는 GKE 자동 라벨만 사용한다
      # (role/workload 등 커스텀 키를 쓰면 노드에 라벨이 없어 영구 Pending).
      nodeSelector:
        cloud.google.com/gke-nodepool: api-pool
      containers:
        - name: notiflex-api
          image: asia-northeast3-docker.pkg.dev/project-fea698e1-5762-48a2-918/notiflex/api:sha-fbe9b37
          ports:
            - name: http
              containerPort: 8080
          env:
            # 앱이 /id 응답의 generated_by에 넣을 Pod 이름을 Downward API로 주입한다.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VALKEY_ADDR
              value: valkey-primary.notiflex.svc.cluster.local:6379
            # ch6.2: K8s Secret 참조 대신 Google Secret Manager를 CSI로 파일 마운트해 읽는다.
            - name: VALKEY_PASSWORD_FILE
              value: /mnt/secrets/valkey-password
            # 8.1: Kafka 브로커(cross-ns). /id 이벤트를 notifications 토픽에 발행하고 구독한다.
            - name: KAFKA_BROKER
              value: notiflex-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
            # 8.2: Tempo OTLP gRPC 엔드포인트(cross-ns). 트레이스를 여기로 보낸다.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: notiflex-tempo.monitoring.svc.cluster.local:4317
          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io # GKE managed (오픈소스는 secrets-store.csi.k8s.io)
            readOnly: true
            volumeAttributes:
              secretProviderClass: notiflex-secrets
