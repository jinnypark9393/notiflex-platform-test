# GKE managed Secret Manager CSI 연동 — provider는 반드시 "gke" (오픈소스는 "gcp").
# K8s Secret 자동 생성(secretObjects) 대신 파일 마운트 방식을 사용한다.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: notiflex-secrets
  namespace: notiflex
  labels:
    app: notiflex-api
    tenant: smb
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/project-fea698e1-5762-48a2-918/secrets/valkey-password/versions/latest"
        path: "valkey-password"
