# 8.3 배치 자동화: 5분마다 notiflex-api /health를 호출하는 헬스체크 CronJob.
# ops-pool에 배치(운영 도구 전용). 200이면 성공 로그, 그 외 exit 1로 실패 처리.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: notiflex-healthcheck
  namespace: notiflex
  labels:
    app: notiflex-api
    tenant: smb
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            cloud.google.com/gke-nodepool: ops-pool
          containers:
            - name: healthcheck
              image: curlimages/curl:latest
              command:
                - sh
                - -c
                - |
                  code=$(curl -s -o /dev/null -w '%{http_code}' -m 5 http://notiflex-api.notiflex.svc.cluster.local/health)
                  if [ "$code" = "200" ]; then
                    echo "healthcheck OK ($code)"
                  else
                    echo "healthcheck FAILED ($code)"; exit 1
                  fi
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
