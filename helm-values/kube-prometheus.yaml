# kube-prometheus-stack 값 오버라이드 (책 4.2)
# e2-medium 2노드 예산에 맞춘 requests 축소값.
# ch6.2: CSI DaemonSet(노드당 ~120m) 추가를 위해 cpu를 5m으로 재축소 (가드레일 사전 대응).
# ch7.2 노드풀 확장 후 원래 값 복원을 검토한다.

prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 5m
        memory: 256Mi

grafana:
  resources:
    requests:
      cpu: 5m
      memory: 128Mi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
